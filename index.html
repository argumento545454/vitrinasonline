<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>index_html_06_VOnline_radio</title>




<style>
  body { font-family: Arial, sans-serif; text-align: center; margin-top: 20px; }
  button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
  #radioContainer { margin-top: 20px; display: none; }
</style>
</head>
<body>

<h1>Vitrinas Online</h1>
<button id="btnToggleRadio">Mostrar/Ocultar Radio</button>

<!-- Contenedor de radio -->
<div id="radioContainer">
  <audio controls>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    Tu navegador no soporta el elemento de audio.
  </audio>
</div>

<script>
// Botón para mostrar/ocultar el radio
document.getElementById('btnToggleRadio').addEventListener('click', () => {
  const cont = document.getElementById('radioContainer');
  if (cont.style.display === 'none') {
    cont.style.display = 'block'; // mostrar el radio
  } else {
    cont.style.display = 'none'; // ocultar el radio
  }
});
</script>

</body>
</html>
