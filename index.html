<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>index.html</title>     <!--botones varios xxx.js -->

<style>
  body { margin:0; font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; }
  h1 { font-size:2.2rem; margin-bottom:40px; text-align:center; }
  button { padding:12px 30px; font-size:1rem; cursor:pointer; border:none; border-radius:8px; background:#0066ff; color:#fff; margin:5px; box-shadow:0 4px 14px rgba(0,0,0,0.2); transition:0.2s; }
  button:hover { background:#004ecc; }
  #appContainer { width:100%; height:100%; margin-top:20px; }
</style>
</head>
<body>

<h1>Vitrinas Online controladas por VOZ</h1>

<!-- Botones para cargar segmentos .js -->
<button class="loadSegment" data-src="ropa_61.js">Cargar ropa_61.js</button>
<button class="loadSegment" data-src="ropa_62.js">Cargar ropa_62.js</button>
<button class="loadSegment" data-src="ropa_63.js">Cargar ropa_63.js</button>

<!-- Contenedor donde se cargarß el segmento en memoria -->
<div id="appContainer"></div>

<script>
  // Funci¾n para cargar un segmento .js dinßmicamente
  function loadSegment(file) {
      // Evitar duplicar el mismo script
      if(document.querySelector(`script[src="${file}"]`)) {
          console.log(file + " ya estß cargado.");
          return;
      }

      const script = document.createElement('script');
      script.src = file;
      script.type = 'text/javascript';
      script.onload = () => console.log(file + " cargado correctamente.");
      script.onerror = () => console.error("Error al cargar " + file);

      document.getElementById('appContainer').appendChild(script);
  }

  // Asignar evento a todos los botones
  document.querySelectorAll('.loadSegment').forEach(btn => {
      btn.addEventListener('click', () => {
          const file = btn.getAttribute('data-src');
          loadSegment(file);
      });
  });
</script>

</body>
</html>
