<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>index_html_06_VOnline_radio</title>



<style>
  body { font-family: Arial, sans-serif; text-align: center; margin-top: 20px; }
  button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
  #msgCarga { color: green; font-weight: bold; margin-top: 20px; }
  #codigoRopa3 { 
    text-align: left; margin: 20px auto; width: 90%; 
    background: #f4f4f4; border: 1px solid #ccc; padding: 10px; 
    white-space: pre-wrap; overflow-x: auto; max-height: 400px; 
  }
  #pantalla { margin-top: 20px; font-size: 16px; color: #333; 
    border: 1px solid #ccc; padding: 10px; min-height: 50px; width: 90%; 
    margin-left:auto; margin-right:auto; background:#fff; 
  }
  .radio-container { margin-top: 20px; }
  .radio-label { font-size: 16px; margin-right: 15px; cursor: pointer; }
</style>
</head>
<body>

<h1>Vitrinas Online</h1>
<button id="btnTutorial">Tutorial</button>
<button id="btnDemo">Demo</button>

<!-- Botón Radio agregado -->
<div class="radio-container">
  <label class="radio-label">
    <input type="radio" name="opcionRopa3" id="radio1"> Opción Radio 1
  </label>
  <label class="radio-label">
    <input type="radio" name="opcionRopa3" id="radio2"> Opción Radio 2
  </label>
</div>

<p id="msgCarga"></p>
<pre id="codigoRopa3"></pre>
<div id="pantalla"></div>

<script>
// 1️⃣ Tomamos la Ropa3 ya en memoria
let ropa3Text = localStorage.getItem('ropa3') || '';
if(ropa3Text){
  document.getElementById('codigoRopa3').textContent = ropa3Text;
  const msg = document.getElementById('msgCarga');
  msg.textContent = 'Ropa3 cargada correctamente en navegador';
  setTimeout(() => { msg.textContent = ''; }, 5000);
}

// 2️⃣ Función que ejecuta cualquier función que exista en Ropa3
function ejecutarFuncion(nombreFuncion){
  if(!ropa3Text){
    console.warn('Ropa3 no cargado');
    return;
  }

  // Creamos un Function que define todo Ropa3 en memoria y ejecuta la función solicitada
  const funcScript = `
    const pantallaDiv = document.getElementById('pantalla');
    ${ropa3Text}
    try {
      if(typeof ${nombreFuncion}==='function'){ ${nombreFuncion}(); } 
      else { pantallaDiv.textContent = '${nombreFuncion} no disponible'; }
    } catch(e) {
      pantallaDiv.textContent = '${nombreFuncion} falló: '+e.message;
    }
  `;
  
  try{
    new Function(funcScript)();
  }catch(e){
    console.error('Error ejecutando', nombreFuncion, e);
    document.getElementById('pantalla').textContent = nombreFuncion + ' fallo: ' + e.message;
  }
}

// 3️⃣ Botones Tutorial y Demo
document.getElementById('btnTutorial').addEventListener('click', () => {
  ejecutarFuncion('tutorial'); // usamos el nombre real de la función tutorial en Ropa3
});

document.getElementById('btnDemo').addEventListener('click', () => {
  ejecutarFuncion('demo'); // usamos el nombre real de la función demo en Ropa3
});

// 4️⃣ Botones radio: llamamos funciones existentes en Ropa3
document.getElementById('radio1').addEventListener('change', () => {
  if(document.getElementById('radio1').checked){
    ejecutarFuncion('radio1'); // nombre real de función en Ropa3 para radio1
  }
});

document.getElementById('radio2').addEventListener('change', () => {
  if(document.getElementById('radio2').checked){
    ejecutarFuncion('radio2'); // nombre real de función en Ropa3 para radio2
  }
});
</script>

</body>
  </html>
