<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEMO_01_RAIZ_05</title>

<style>
  body { 
    margin: 0; 
    font-family: Arial; 
    background: #f0f8ff;
  }
  #topContainer {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
  }
  h1 { 
    font-size: 2.2rem; 
    margin-bottom: 40px; 
    text-align: center; 
  }
  button { 
    padding: 18px 40px; 
    font-size: 1.2rem; 
    cursor: pointer; 
    border: none; 
    border-radius: 10px; 
    background: #0066ff; 
    color: #fff; 
    box-shadow: 0 4px 14px rgba(0,0,0,0.2); 
    transition: 0.2s; 
  }
  button:hover { 
    background: #004ecc; 
  }
  #appContainer { 
    width: 100%; 
    min-height: 400px; 
    margin-top: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
</style>
</head>
<body>

<div id="topContainer">
  <h1>Vitrinas Online controladas por VOZ</h1>
  <button id="btnStart">EJECUTAR PROGRAMA</button>
</div>

<div id="appContainer"></div>

<script>
(function() {
    const btn = document.getElementById("btnStart");
    if (!btn) {
        console.error("Botón no encontrado!");
        return;
    }

    btn.addEventListener("click", () => {
        console.log("Clic detectado en EJECUTAR PROGRAMA");

        // Evitar duplicar script
        if(document.getElementById('segmentScript')) return;

        // Crear script dinámico
        const script = document.createElement('script');
        script.src = 'ropa_61.js'; // Cambiar por la ruta correcta
        script.id = 'segmentScript';
        script.type = 'text/javascript';

        // Cuando el script termine de cargar, podemos iniciar Ropa3 si existe la función
        script.onload = () => {
            console.log("Script cargado dinámicamente: ropa_61.js");
            if (typeof iniciarRopa3 === 'function') {
                iniciarRopa3('#appContainer');
            } else {
                console.warn("Ropa3 cargado, pero no se encontró la función iniciarRopa3");
            }
        };

        document.body.appendChild(script);

        // Ocultar botón después de cargar
        btn.style.display = "none";
    });
})();
</script>

</body>
</html>
