<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>index_html_05_VOnline_tutorial</title>


<style>
  body { font-family: Arial, sans-serif; text-align: center; margin-top: 20px; }
  button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
  #msgCarga { color: green; font-weight: bold; margin-top: 20px; }
  #codigoRopa3 { 
    text-align: left; margin: 20px auto; width: 90%; 
    background: #f4f4f4; border: 1px solid #ccc; padding: 10px; 
    white-space: pre-wrap; overflow-x: auto; max-height: 400px; 
  }
  #pantalla { margin-top: 20px; font-size: 16px; color: #333; 
    border: 1px solid #ccc; padding: 10px; min-height: 50px; width: 90%; 
    margin-left:auto; margin-right:auto; background:#fff; 
  }
</style>
</head>
<body>

<h1>Vitrinas Online</h1>
<button id="btnTutorial">Tutorial</button>
<button id="btnDemo">Demo</button>

<p id="msgCarga"></p>
<pre id="codigoRopa3"></pre>
<div id="pantalla"></div>

<script>
// 1️⃣ Guardamos la Ropa3 en memoria (ya la tenemos)
let ropa3Text = localStorage.getItem('ropa3') || '';
if(ropa3Text){
  document.getElementById('codigoRopa3').textContent = ropa3Text;
  const msg = document.getElementById('msgCarga');
  msg.textContent = 'Ropa3 cargada correctamente en navegador';
  setTimeout(() => { msg.textContent = ''; }, 5000);
}

// 2️⃣ Función para ejecutar cualquier función de Ropa3 bajo demanda
function ejecutarFuncion(nombreFuncion){
  if(!ropa3Text){
    console.warn('Ropa3 no cargado');
    return;
  }

  // Creamos un Function que recibe el div pantalla
  const funcScript = `
    const pantallaDiv = document.getElementById('pantalla');
    ${ropa3Text}
    if(typeof ${nombreFuncion}==='function'){ ${nombreFuncion}(); } 
    else { pantallaDiv.textContent = '${nombreFuncion} no disponible'; }
  `;
  
  try{
    new Function(funcScript)();
  }catch(e){
    console.error('Error ejecutando', nombreFuncion, e);
    document.getElementById('pantalla').textContent = nombreFuncion + ' no disponible';
  }
}

// 3️⃣ Eventos de botones
document.getElementById('btnTutorial').addEventListener('click', () => {
  ejecutarFuncion('tutorial');
});

document.getElementById('btnDemo').addEventListener('click', () => {
  ejecutarFuncion('demo');
});
</script>

</body>
</html>
