<!-- CONTROL DE SCROLL AUTOMÁTICO EN MENÚ DE CATEGORÍAS -->

<script>
/*========================================================
=               DATA DIVISION - CONFIGURACIÓN             =
========================================================*/
document.addEventListener("DOMContentLoaded", () => {

  const LIMITE_SCROLL = 20; // Número máximo visible antes de activar scroll
  const ID_MENU = "menuColDerecha";
  const CLAVE_LOCAL_CATS = "categoriasIniciales";

  /*========================================================
  =               PROCEDURE DIVISION - LÓGICA               =
  ========================================================*/

  function aplicarScrollSegunCantidad() {
    const menu = document.getElementById(ID_MENU);
    if (!menu) return;

    const categorias = JSON.parse(localStorage.getItem(CLAVE_LOCAL_CATS)) || [];
    const cantidad = categorias.length;

    // --- Evaluación ---
    if (cantidad > LIMITE_SCROLL) {
      menu.style.overflowY = "auto";
      menu.style.maxHeight = "100vh";
      menu.style.scrollbarWidth = "thin";
      console.log(`Scroll ACTIVADO (${cantidad} categorías)`);
    } else {
      menu.style.overflowY = "visible";
      menu.style.maxHeight = "none";
      console.log(`Scroll DESACTIVADO (${cantidad} categorías)`);
    }
  }

  /*========================================================
  =               EVENTO PRINCIPAL                         =
  ========================================================*/
  // Aplicar al cargar página
  aplicarScrollSegunCantidad();

  // Reaplicar cada vez que cambien las categorías
  window.addEventListener("storage", (e) => {
    if (e.key === CLAVE_LOCAL_CATS) aplicarScrollSegunCantidad();
  });
});
</script>

<script>

//3.1
document.addEventListener("DOMContentLoaded", () => {


//3.2

  // ====== Variables principales ======
// ====== Variables principales ======
let categoriasIniciales = JSON.parse(localStorage.getItem('categoriasIniciales'));

// Si no existe nada en localStorage, iniciar con arreglo vacío (NO restaurar desde categoriasOriginales)
if (!categoriasIniciales) {
  categoriasIniciales = [];
  localStorage.setItem('categoriasIniciales', JSON.stringify(categoriasIniciales));
}

let indiceCategoria = 0;
let tiempoMenu = parseInt(localStorage.getItem('tiempoRotacion')) || 3000;
let velocidadCarrusel = parseFloat(localStorage.getItem('velocidadCarrusel')) || 1;
let intervaloCategorias;

const menuColDerecha = document.getElementById('menuColDerecha');
const botonesExtraDerecha = document.getElementById('botonesExtraDerecha');
const nombreCategoriaElem = document.getElementById('nombreCategoriaMenuDerecha');
const contenedorCarrusel = document.getElementById('contenedorCarruselDerecha');
const carruselAutomatico = document.getElementById('carruselAutomatico');

//3.3

  // ====== Men� lateral de categor�as ======
  categoriasIniciales.forEach((cat, idx)=>{
    const btn=document.createElement('button');
    btn.textContent=cat.nombre;
    btn.style.cssText="display:block;width:100%;font-size:20px;margin:5px 0;padding:10px;background:#007bff;color:#fff;border:none;border-radius:4px;cursor:pointer;";
    btn.addEventListener('click',()=>{ indiceCategoria=idx; mostrarCategoria(); });
    menuColDerecha.insertBefore(btn, botonesExtraDerecha);
  });


//3.4

  // ====== Botones extra ======

//3.4.1

  const btnSubirImg=document.createElement("button");
  btnSubirImg.textContent="Subir img";
  btnSubirImg.style.cssText="padding:6px;background:#28a745;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:20px;";

//3.4.2

  const contTiempo=document.createElement("div");
  contTiempo.style.cssText="display:flex;flex-direction:column;align-items:center;gap:4px;background:#ff9800;border-radius:6px;padding:6px;font-size:18px;";
  const textoTiempo=document.createElement("div");
  textoTiempo.style.cssText="color:black;font-weight:bold;";
  const flechaArriba=document.createElement("button");
  const flechaAbajo=document.createElement("button");
  [flechaArriba,flechaAbajo].forEach(b=>{ b.style.cssText="width:100%;border:none;background:#fff;color:#ff9800;font-size:16px;border-radius:4px;cursor:pointer;"; });
  flechaArriba.textContent = "▲";
  flechaAbajo.textContent = "▼";
  //flechaArriba.textContent="ʌ"; flechaAbajo.textContent="˅";
  contTiempo.append(flechaArriba,textoTiempo,flechaAbajo);


//3.4.3

  const btnVelocidad=document.createElement("button");
  btnVelocidad.textContent="Velocidad";
  btnVelocidad.style.cssText="padding:6px;background:#673ab7;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:20px;";

  botonesExtraDerecha.append(btnSubirImg,contTiempo,btnVelocidad);

//3.4.4

  // ====== Subir imagen ======
  btnSubirImg.addEventListener("click",()=>{
    const input=document.createElement("input");
    input.type="file"; input.accept="image/*"; input.multiple=true;
    input.onchange=e=>{
      Array.from(e.target.files).forEach(f=>{
        const fr=new FileReader();
        fr.onload=ev=>{
          categoriasIniciales[indiceCategoria].imagenes.push(ev.target.result);
          localStorage.setItem('categoriasIniciales',JSON.stringify(categoriasIniciales));
          mostrarCategoria();
        };
        fr.readAsDataURL(f);
      });
    };
    input.click();
  });


//3.4.5

  // ====== Control tiempo ======
  function reiniciarIntervaloMenu(){
    clearInterval(intervaloCategorias);
    intervaloCategorias=setInterval(()=>{
      indiceCategoria=(indiceCategoria+1)%categoriasIniciales.length;
      mostrarCategoria();
    }, tiempoMenu);
    localStorage.setItem('tiempoRotacion',tiempoMenu);
  }
  flechaArriba.addEventListener("click",()=>{ tiempoMenu=Math.min(tiempoMenu+5000,90000); textoTiempo.textContent=`Tiempo: ${(tiempoMenu/1000).toFixed(1)}s`; reiniciarIntervaloMenu(); });
  flechaAbajo.addEventListener("click",()=>{ tiempoMenu=Math.max(tiempoMenu-5000,5000); textoTiempo.textContent=`Tiempo: ${(tiempoMenu/1000).toFixed(1)}s`; reiniciarIntervaloMenu(); });


//3.4.6

  // ====== Control velocidad ======
  btnVelocidad.addEventListener("click",()=>{
    velocidadCarrusel+=0.2; if(velocidadCarrusel>3) velocidadCarrusel=0.4;
    localStorage.setItem('velocidadCarrusel',velocidadCarrusel);
    btnVelocidad.textContent=`Velocidad �${velocidadCarrusel.toFixed(1)}`;
  });


//3.4.7

  // ====== Carrusel ovalado ======
  function iniciarCarrusel(){
    carruselAutomatico.innerHTML="";
    const categoria=categoriasIniciales[indiceCategoria];
    if(!categoria || !categoria.imagenes || categoria.imagenes.length===0) return;

    const radioX=Math.max(200,(carruselAutomatico.clientWidth/2)-120);

    const radioY=Math.max(120,(carruselAutomatico.clientHeight/2)-40);

    const imgs=[];
    categoria.imagenes.forEach((url,idx)=>{
      const img=document.createElement("img");
      img.src=url; img.className="imgCarrusel"; img.dataset.index=idx; img._hover=false;
      carruselAutomatico.appendChild(img); imgs.push(img);

      img.addEventListener("mouseenter",()=>{ img._hover=true; window.__ropa3_paused=true; });
      img.addEventListener("mouseleave",()=>{ img._hover=false; window.__ropa3_paused=false; });

      img.addEventListener("click",()=>{
        const arr=categoria.imagenes; const i=parseInt(img.dataset.index,10);
        if(!isNaN(i) && arr[i]){
          const item=arr.splice(i,1)[0]; arr.unshift(item);
          localStorage.setItem('categoriasIniciales',JSON.stringify(categoriasIniciales));
          mostrarCategoria();
        }
      });
    });

    let angulo=0; let ultimo=performance.now(); window.__ropa3_paused=false;
    function animarOval(now){
      const delta=(now-ultimo)/1000; ultimo=now;
      if(!window.__ropa3_paused) angulo+=velocidadCarrusel*60*delta;
      imgs.forEach((el,i)=>{
        const fase=(i*360/imgs.length+angulo)*Math.PI/180;
        const x=Math.cos(fase)*radioX;
        const y=Math.sin(fase)*radioY*0.7;
        const z=Math.sin(fase)*80;
        const baseScale=1+z/400;
        const hoverExtra=el._hover?1.35:1;
        const escalaFinal=baseScale*hoverExtra;
        const op=Math.min(1,Math.max(0.2,0.55+z/200));
        el.style.transform=`translate3d(${x}px,${y}px,${z}px) scale(${escalaFinal})`;
        el.style.opacity=op;
        el.style.zIndex=Math.round(300+z);
        el.dataset.index=i;
      });
      requestAnimationFrame(animarOval);
    }
    ultimo=performance.now(); requestAnimationFrame(animarOval);
  }



//3.4.8

  // ====== Mostrar categoria ======
  function mostrarCategoria(){
    const categoria=categoriasIniciales[indiceCategoria];
    nombreCategoriaElem.textContent=categoria.nombre;


//3.4.9
// --- Mostrar también el código (codCat) debajo del nombre ---
const tabla = JSON.parse(localStorage.getItem('tablaExcel')) || [];
let codigoCat = '(sin código)';


//3.4.10

// Intentar buscar coincidencia por nombre
if (tabla.length > 0) {
  const filaCat = tabla.find(f =>
    (f.nameCat || '').trim().toLowerCase() === categoria.nombre.trim().toLowerCase()
  );
  if (filaCat && filaCat.codCat !== undefined) {
    codigoCat = filaCat.codCat;
  }
}


//3.4.11

// Crear o actualizar el contenedor
//Codigo 
let tituloCat = document.getElementById('tituloCategoria');
if (!tituloCat) {
  tituloCat = document.createElement('div');
  tituloCat.id = 'tituloCategoria';
  tituloCat.style.cssText = `
    position: fixed;
    top: 50px;
    left: 400px;
    font-family: sans-serif;
    font-size: 20px;
    font-weight: bold;
    color: #000;
    z-index: 99999;
    line-height: 1.4;
    background: rgba(255,255,255,0.7);
    padding: 5px 10px;
    border-radius: 8px;
  `;
  document.body.appendChild(tituloCat);
}


//3.4.12

// Codigo Categoria mostrar en líneas separadas
tituloCat.innerHTML = `
  <!--<div>${categoria.nombre}</div>-->
  <div style="font-size:36px; color:#333; font-weight:normal;">
    C ${codigoCat}
  </div>
`;





//3.4.13
// Franja miniaturas — SOLO MOSTRAR, SIN ELIMINAR, SIN ARRASTRE, SIN MOUSE

// Limpieza total del contenedor
while (contenedorCarrusel.firstChild) {
  contenedorCarrusel.removeChild(contenedorCarrusel.firstChild);
}

//3.4.13.1
contenedorCarrusel.innerHTML = "";

categoria.imagenes.forEach((imgSrc, idx) => {

  const wrapper = document.createElement("div");
  wrapper.style.cssText =
    "position:relative;width:60px;height:60px;display:inline-block;margin-right:4px;cursor:default;";

  const miniatura = document.createElement("img");

  //3.4.13.2 — convertir a ruta absoluta
  const abs = document.createElement("a");
  abs.href = imgSrc;
  miniatura.src = abs.href;

  //3.4.13.3
  miniatura.style.cssText =
    "width:100%;height:100%;object-fit:cover;border-radius:8px;user-select:none;pointer-events:none;cursor:default;";

  // ⚠️ SIN BOTÓN ELIMINAR
  // ⚠️ SIN EVENTOS DE MOUSE
  // ⚠️ SIN ARRASTRE

  wrapper.append(miniatura);
  contenedorCarrusel.appendChild(wrapper);
});

// Sin iniciar arrastre, no tocamos el carrusel general
iniciarCarrusel();







//3.4.14

//TIEMPO
    textoTiempo.textContent=`Tiempo: ${(tiempoMenu/1000).toFixed(1)}s`;


//3.4.15

//VELOCIDAD
    btnVelocidad.textContent=`Velocidad Images ${velocidadCarrusel.toFixed(1)}`;
  }

  mostrarCategoria();
  reiniciarIntervaloMenu();


//3.4.16

  // ====== Bot�n discreto Ropa1 ======
  const ropa1=document.getElementById("ropa1")||document.querySelector(".ropa1");
  if(ropa1){ ropa1.style.display="none"; ropa1.style.opacity="0"; }
  const btnMostrarRopa1=document.createElement("button"); btnMostrarRopa1.id="btnMostrarRopa1"; btnMostrarRopa1.textContent="Col Menú";
  btnMostrarRopa1.title="Click o Ctrl+Alt+R para mostrar/ocultar Ropa 1";
  btnMostrarRopa1.addEventListener("click",()=>{ 
    if(!ropa1) return;
    const visible=ropa1.style.display!=="none";
    ropa1.style.display=visible?"none":"block";
    ropa1.style.opacity=visible?"0":"1";
  });
  btnMostrarRopa1.addEventListener("mouseenter",()=>{ btnMostrarRopa1.style.opacity="1"; btnMostrarRopa1.style.transform="scale(1.05)"; });
  btnMostrarRopa1.addEventListener("mouseleave",()=>{ btnMostrarRopa1.style.opacity="0.2"; btnMostrarRopa1.style.transform="scale(1)"; });
  document.body.appendChild(btnMostrarRopa1);

  document.addEventListener("keydown",(e)=>{ if(e.ctrlKey && e.altKey && e.key.toLowerCase()==="r"){ btnMostrarRopa1.click(); } });
});
</script>

  <script>
  
//14.1
  
    (function(){
      const videoEl = document.getElementById('vc-video');
      const capturedImg = document.getElementById('vc-captured');
      const capturedLabel = document.getElementById('vc-captured-label');
      const carrusel = document.getElementById('carruselAutomatico'); 
      const franja = document.getElementById('contenedorCarruselDerecha');

      let stream = null;
      let recognition = null;
      let isCameraOn = false;
      let cameraTimeoutId = null; // temporizador de cierre automático

      // === FUNCIONES DE CÁMARA ===
      async function startCamera() {
        if(isCameraOn) return;

        if(carrusel) carrusel.style.display = 'none';
        if(franja) franja.style.display = 'none';

        try {
          stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:"user" } });
          videoEl.srcObject = stream;
          videoEl.style.display = 'block';
          isCameraOn = true;
          console.log('Cámara encendida');

          // Temporizador 30s para cerrar automáticamente si no se toma foto
          cameraTimeoutId = setTimeout(() => {
            stopCamera();
            console.log('Cierre automático: no se tomó foto en 30s');
          }, 30000);

        } catch(e) { console.error(e); }
      }


//14.2

      function stopCamera() {
        if(!stream) return;

        if(carrusel) carrusel.style.display = 'flex';
        if(franja) franja.style.display = 'flex';

        stream.getTracks().forEach(t=>t.stop());
        stream = null;
        videoEl.srcObject = null;
        videoEl.style.display = 'none';
        isCameraOn = false;

        // Limpiar temporizador si existe
        if(cameraTimeoutId){
          clearTimeout(cameraTimeoutId);
          cameraTimeoutId = null;
        }

        console.log('Cámara apagada');
      }


//14.3

      function takePhotoAndDownload(){
        if(!isCameraOn || !videoEl.srcObject) return;

        // Cancelar temporizador de cierre automático
        if(cameraTimeoutId){
          clearTimeout(cameraTimeoutId);
          cameraTimeoutId = null;
        }

        const track = videoEl.srcObject.getVideoTracks()[0];
        const settings = track.getSettings ? track.getSettings() : {};
        const w = settings.width || videoEl.videoWidth || 1280;
        const h = settings.height || videoEl.videoHeight || 720;

        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(videoEl, 0, 0, w, h);

        canvas.toBlob(blob => {
          if(!blob) return;
          const reader = new FileReader();
          reader.onload = e => {
            // Ocultar foto anterior si está visible
            capturedImg.style.display = 'none';
            capturedLabel.style.display = 'none';

            // Mostrar la nueva foto
            capturedImg.src = e.target.result;
            capturedImg.style.display = 'block';
            capturedLabel.style.display = 'block';
            
            stopCamera();
            console.log('Foto tomada correctamente (vista previa)');
            
            // Ocultar foto después de 30s
            setTimeout(() => {
              capturedImg.style.display = 'none';
              capturedLabel.style.display = 'none';
            }, 30000);
          };
          reader.readAsDataURL(blob);
        }, 'image/jpeg', 0.92);
      }


//14.4

      // === EXPONER FUNCIONES GLOBALMENTE PARA RECONOCIMIENTO ===
      window.startCamera = startCamera;
      window.stopCamera = stopCamera;
      window.takePhotoAndDownload = takePhotoAndDownload;


//14.5

      // === RECONOCIMIENTO DE VOZ ===
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!SR){ console.warn('Reconocimiento de voz no soportado'); return; }

      recognition = new SR();
      recognition.lang = 'es-ES';
      recognition.continuous = true;
      recognition.interimResults = false;

      recognition.onresult = (event) => {
        const last = event.results[event.results.length - 1];
        const text = (last[0].transcript || '').trim().toLowerCase();
        console.log('Voz detectada:', text);


//14.6

        // --- 1. Comandos de cámara ---
        if(text.includes('encender cámara') || text.includes('prender cámara')) startCamera();
        else if(text.includes('tomar foto') || text.includes('sacar foto') || text.includes('tomar una foto') || text.includes('sacar una foto'))
            takePhotoAndDownload();
        else if(text.includes('apagar cámara') || text.includes('cerrar cámara')) stopCamera();


//14.7

        // --- 2. Comandos de categorías ---
        if(window.modoCategorias){
          const menuDerecho = document.getElementById('menuColDerecha');
          const botonesCat = menuDerecho.querySelectorAll('button');
          botonesCat.forEach(boton => {
            const nombre = boton.textContent.trim().toLowerCase();
            if(text.includes(nombre)){
              console.log('Seleccionando categoría:', nombre);
              boton.click();
            }
          });
        }
      };

      recognition.onend = () => { try{ recognition.start(); }catch(e){} };
      try{ recognition.start(); }catch(e){ console.warn('No se pudo iniciar automáticamente', e); }

      // === BOTÓN PARA ACTIVAR MODO CATEGORÍAS ===
      document.addEventListener("DOMContentLoaded", () => {
        const menuDerecho = document.getElementById('menuColDerecha');
        if(!menuDerecho) return;

        const btnVozCategorias = document.createElement('button');
        btnVozCategorias.textContent = 'Activar Voz Categorías';
        btnVozCategorias.style.cssText = "margin:5px 0;padding:8px 12px;background:#28a745;color:black;border:none;border-radius:4px;cursor:pointer;font-size:16px;";
        menuDerecho.insertBefore(btnVozCategorias, menuDerecho.firstChild);

        window.modoCategorias = false;

        btnVozCategorias.addEventListener('click', () => {
          window.modoCategorias = true;
          btnVozCategorias.textContent = 'Voz Categorías';
          btnVozCategorias.style.background = 'yellow';
          console.log('Modo categorías activado por voz');
        });
      });

    })();
  </script>

<script>

//16.2.1
document.addEventListener("DOMContentLoaded", () => {
  const menuDerecho = document.getElementById('menuColDerecha');
  if(!menuDerecho) return;

  const CLAVE_LOCAL_TABLA = 'tablaExcel';
  const CLAVE_LOCAL_CATS = 'categoriasIniciales';

//16.2.2
  // --- Botón subir tabla Excel ---
  const btnSubir = document.createElement('button');
  btnSubir.textContent = 'Subir Tabla';
  btnSubir.style.cssText = "padding:8px 12px;margin:5px;cursor:pointer;";
  menuDerecho.appendChild(btnSubir);

//16.2.3
  // --- Input oculto ---
  const inputExcel = document.createElement('input');
  inputExcel.type = 'file';
  inputExcel.accept = '.xlsx';
  inputExcel.style.display = 'none';
  menuDerecho.appendChild(inputExcel);
  btnSubir.addEventListener('click', () => inputExcel.click());

//16.2.4
  // --- Contenedor para tabla ---
  const display = document.createElement('div');
  display.id = 'displayExcel';
  display.style.cssText = `
    position: fixed;
    top: 50px;
    right: 20px;
    max-width: 40vw;
    max-height: 50vh;
    overflow: auto;
    background: #fff;
    border: 2px solid #222;
    padding: 10px;
    border-radius: 10px;
    display: none;  // Aseguramos que la tabla esté oculta al inicio
    z-index: 9999;
  `;
  document.body.appendChild(display);

//16.2.5
  // --- Botón mostrar/ocultar tabla ---
  const btnMostrar = document.createElement('button');
  btnMostrar.textContent = 'Mostrar Tabla';
  btnMostrar.style.cssText = `
    position: fixed;
    top: 20px;
    right: 20px;
    color: white;
	background: lavender;
    border: 1px solid #888;
    border-radius: 6px;
    padding: 4px 8px;
    cursor: pointer;
    z-index: 10000;
    opacity: 0.7;
  `;
  document.body.appendChild(btnMostrar);

  btnMostrar.addEventListener('click', () => {
    const visible = display.style.display === 'block';
    display.style.display = visible ? 'none' : 'block';
    btnMostrar.textContent = visible ? 'Mostrar Tabla' : 'Ocultar Tabla';  // Mostrar/Ocultar
  });

//16.2.6
  // --- Función para mostrar tabla ---
  function mostrarTabla(datos){
    if(!datos || datos.length === 0) return;
    const columnas = Object.keys(datos[0]);
    let html = '<table><thead><tr>';
    columnas.forEach(c => html += `<th>${c}</th>`);
    html += '</tr></thead><tbody>';
    datos.forEach(fila => {
      html += '<tr>';
      columnas.forEach(c => html += `<td>${fila[c] || ""}</td>`);
      html += '</tr>';
    });
    html += '</tbody></table>';
    display.innerHTML = html;

    const table = display.querySelector("table");
    table.style.borderCollapse = "collapse";
    table.style.width = "100%";
    table.querySelectorAll("td, th").forEach(cell => {
      cell.style.border = "1px solid #666";
      cell.style.padding = "4px 6px";
    });
  }

//16.2.7
  // --- Leer Excel ---
  inputExcel.addEventListener('change', () => {
    const archivo = inputExcel.files[0];
    if(!archivo) return;

    const lector = new FileReader();
    lector.onload = (e) => {
      const datos = new Uint8Array(e.target.result);
      const workbook = XLSX.read(datos, { type: 'array' });
      const hoja = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(hoja);

//16.2.8
      // --- Guardar tabla Excel ---
      localStorage.setItem(CLAVE_LOCAL_TABLA, JSON.stringify(json));



//16.2.9
// CATEGORIAS MANTENER - INGRESAR - BORRAR
// --- Detectar y sincronizar categorías (versión mejorada: conserva imágenes) ---

let categoriasAntiguas = JSON.parse(localStorage.getItem(CLAVE_LOCAL_CATS)) || [];
let categoriasNuevas = [];

// --- DATA DIVISION ---
// Extraer nombres de categorías desde la tabla Excel
json.forEach(fila => {
  const catNombre = (fila.nameCat || '').toString().trim() || 'SinCategoria';
  if (!categoriasNuevas.find(n => n.toLowerCase() === catNombre.toLowerCase())) {
    categoriasNuevas.push(catNombre);
  }
});

// --- PROCEDURE DIVISION ---
// Reglas:
// 1) Si la categoría EXISTE → mantener objeto completo (incluye imágenes).
// 2) Si es NUEVA → se crea.
// 3) Si una antigua no está en la tabla → se elimina.

let categoriasFinales = categoriasNuevas.map(nombre => {
  const existente = categoriasAntiguas.find(
    c => (c.nombre || '').toString().trim().toLowerCase() === nombre.toLowerCase()
  );

  if (existente) {
    // Asegurar propiedad imagenes
    if (!Array.isArray(existente.imagenes)) existente.imagenes = [];
    // Sincronizar el nombre tal cual viene del Excel
    existente.nombre = nombre;
    return existente;
  } else {
    return { nombre: nombre, imagenes: [] };
  }
});

// Guardar categorías sincronizadas
localStorage.setItem(CLAVE_LOCAL_CATS, JSON.stringify(categoriasFinales));

// Guardar tabla completa ORIGINAL (para el botón PRODUCTOS)
localStorage.setItem('tablaExcelDuplicar', JSON.stringify(json));



//16.2.10
      // --- Mostrar tabla y botones ---
      mostrarTabla(json);
      renderCategorias(categoriasFinales);
      btnMostrar.textContent = 'Mostrar Tabla';   // Cambia el texto del botón a "Mostrar Tabla" después de cargar el contenido
    };
    lector.readAsArrayBuffer(archivo);
  });

//16.2.11
  // --- Cargar tabla y categorías si existen ---
  const guardado = localStorage.getItem(CLAVE_LOCAL_TABLA);
  const catsGuardadas = localStorage.getItem(CLAVE_LOCAL_CATS);
  if (guardado) {
    mostrarTabla(JSON.parse(guardado));  // Muestra la tabla si los datos existen
    display.style.display = 'none';  // Asegura que la tabla esté oculta cuando se carga la página
    btnMostrar.textContent = 'Mostrar Tabla';    // Asegura que el texto del botón sea "Mostrar Tabla"
  }
  if (catsGuardadas) {
    renderCategorias(JSON.parse(catsGuardadas));
  }

});
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const urls = [
    "https://picsum.photos/200/200?random=1",
    "https://picsum.photos/200/200?random=2",
    "https://picsum.photos/200/200?random=3",
    "https://picsum.photos/200/200?random=4"
  ];

  const carousel = document.getElementById("urlCarousel");
  const images = [];

  // Crear imágenes
  urls.forEach(url => {
    const img = document.createElement("img");
    img.src = url;
    carousel.appendChild(img);
    images.push(img);
  });

  let angle = 0;
  const radiusX = 150; // ancho del óvalo
  const radiusY = 60;  // alto del óvalo
  const centerX = 200; // centro del panel
  const centerY = 100;

  function rotateCarousel() {
    const step = (2 * Math.PI) / images.length;
    images.forEach((img, i) => {
      const theta = angle + i * step;
      const x = centerX + radiusX * Math.cos(theta) - 50; // 50 = mitad ancho img
      const y = centerY + radiusY * Math.sin(theta) - 50;
      img.style.transform = `translate(${x}px, ${y}px)`;
    });
    angle += 0.02; // velocidad de rotación
    requestAnimationFrame(rotateCarousel);
  }

  rotateCarousel();
});
</script>

<!-- BOTÓN PARA MOSTRAR/OCULTAR RADIO -->
<button id="toggleRadioRopa3">🎵 RADIO</button>


<!--18.2-->

<!-- PANEL DE RADIO -->
<div id="radioPanelRopa3">
  <audio id="radioPlayerRopa3" controls autoplay></audio>
  <input id="volumenRopa3" type="range" min="0" max="1" step="0.01" value="0.5">

  <div id="urlSectionRopa3">
    <input id="urlInputRopa3" type="text" placeholder="Pega aquí tu URL de radio..." />
    <button id="btnAplicarRopa3">APLICAR 🔊</button>
  </div>

  <button id="resetBtnRopa3">Search</button>
  <div id="estadoRopa3">Cargando...</div>
</div>



<!--18.3-->

<style>
  /* BOTÓN MOSTRAR/OCULTAR */
  #toggleRadioRopa3 {
    position: fixed;
    bottom: 20px;
    right: 320px;
    background: aliceblue;
    color: #000;
    font-weight: bold;
    font-family: "Courier New", monospace;
    border: none;
    border-radius: 12px;
    padding: 8px 16px;
    cursor: pointer;
    box-shadow: 0 0 10px #0f0;
    z-index: 10000;
    transition: transform 0.2s;
  }
  #toggleRadioRopa3:hover { transform: scale(1.1); }

  /* PANEL DE RADIO */
  #radioPanelRopa3 {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 280px;
    padding: 15px;
    background: rgba(0,0,0,0.9);
    border: 2px solid #0f0;
    border-radius: 20px;
    box-shadow: 0 0 15px #0f0;
    color: #0f0;
    font-family: "Courier New", monospace;
    text-align: center;
    z-index: 9999;
  }

  #radioPanelRopa3 audio { width: 100%; outline: none; }
  #volumenRopa3 { width: 100%; margin-top: 8px; accent-color: #0f0; }

  #urlSectionRopa3 { margin-top: 8px; display: flex; gap: 5px; }
  #urlInputRopa3 { flex: 1; padding: 4px 6px; border: 1px solid #0f0; background: #000; color: #0f0; border-radius: 6px; font-family: inherit; font-size: 12px; }
  #btnAplicarRopa3 { background: #0f0; color: #000; border: none; border-radius: 6px; padding: 4px 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
  #btnAplicarRopa3:hover { background: #7fff00; }

  #resetBtnRopa3 { margin-top: 10px; background: #f00; border: none; color: #fff; padding: 6px 14px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
  #resetBtnRopa3:hover { background: #ff3333; }

  #estadoRopa3 { margin-top: 6px; font-size: 14px; color: #0ff; }
  @keyframes parpadeoRopa3 { 0%,100%{opacity:1;}50%{opacity:0.3;} }
  .parpadeandoRopa3 { animation: parpadeoRopa3 1s infinite; }
</style>



<!--18.4-->
<script>

//18.4.1
  const radiosRopa3 = [
    "https://stream-ssl.radios-ar.com:10947/stream",
    "https://stream-uk1.radioparadise.com/aac-320",
    "https://icecast.radiofrance.fr/fiprock-hifi.aac",
    "https://stream-ssl.radios-ar.com:10953/stream",
    "https://stream-ssl.radios-ar.com:10965/stream",
    "https://stream-ssl.radios-ar.com:10985/stream",
    "https://stream-ssl.radios-ar.com:10949/stream",
    "https://stream-ssl.radios-ar.com:10979/stream",
    "https://icecast.radiofrance.fr/fipjazz-hifi.aac",
    "https://stream-ssl.radios-ar.com:10951/stream"
  ];

  const player = document.getElementById("radioPlayerRopa3");
  const vol = document.getElementById("volumenRopa3");
  const btn = document.getElementById("resetBtnRopa3");
  const estado = document.getElementById("estadoRopa3");
  const urlInput = document.getElementById("urlInputRopa3");
  const btnAplicar = document.getElementById("btnAplicarRopa3");
  const toggleBtn = document.getElementById("toggleRadioRopa3");
  const panel = document.getElementById("radioPanelRopa3");

  let index = 0;


//18.4.2

  function cargarRadio(src = radiosRopa3[index]) {
    player.src = src;
    player.play().then(() => {
      estado.textContent = `🎵 Sonando instrumental #${index + 1} (9/10)`;
      estado.classList.add("parpadeandoRopa3");
    }).catch(() => {
      estado.textContent = "❌ No suena, usa RESET";
      estado.classList.remove("parpadeandoRopa3");
    });
  }


//18.4.3

  vol.addEventListener("input", () => player.volume = vol.value);
  player.addEventListener("error", () => { estado.textContent = "⚠️ Error de conexión"; estado.classList.remove("parpadeandoRopa3"); });

  btn.addEventListener("click", () => { index = (index + 1) % radiosRopa3.length; estado.textContent = "Reintentando otra emisora..."; cargarRadio(); });
  btnAplicar.addEventListener("click", () => { const url = urlInput.value.trim(); if(url){estado.textContent="Intentando nueva URL...";cargarRadio(url);urlInput.value="";} });


//18.4.4

  // BOTÓN RADIO MOSTRAR/OCULTAR
  toggleBtn.addEventListener("click", () => {
    if(panel.style.display === "none"){
      panel.style.display = "block";
      cargarRadio();
    } else {
      panel.style.display = "none";
      //player.pause();
    }
  });


//18.4.5

  //  RADIO PANEL Iniciamos oculto
  panel.style.display = "none";
</script>

<!-- CUADRO CATEGORÍAS  BOTÓN "PRODUCTOS" DUPLICA - MOSTRAR/OCULTAR suben de TABLA -->
<button id="duplicarCatsBtn" style=" 
  position: fixed; top: 20px; right: 150px; z-index: 1000;
  padding: 8px 12px; background: lavender; color: #fff; border: none;
  border-radius: 8px; cursor: pointer;">Productos</button>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const CLAVE_LOCAL_DUPLICAR = 'tablaExcelDuplicar';
  let contenedorBody = null;   // Contenedor del cuadro grande

  /* ============================================================
     PROCEDURE DIVISION – CREAR / MOSTRAR / OCULTAR CUADRO GRANDE
     ============================================================ */
  function toggleDuplicarCategorias() {
    if(!contenedorBody){
      contenedorBody = document.createElement("div");
      contenedorBody.id = "duplicadoCategorias";
      contenedorBody.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(255,255,255,0.95);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.3);
        z-index: 5000;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        align-items: center;
        overflow: auto;
      `;
      document.body.appendChild(contenedorBody);
    }

    if(contenedorBody.style.display === 'flex'){
      contenedorBody.style.display = 'none';
    } else {
      const copiaCategorias = JSON.parse(localStorage.getItem(CLAVE_LOCAL_DUPLICAR) || "[]");

      if(copiaCategorias.length === 0){
        contenedorBody.innerHTML = "<p>No hay categorías guardadas para duplicar.</p>";
      } else {
        contenedorBody.innerHTML = "";
        copiaCategorias.forEach((cat, i) => {
          const btn = document.createElement("button");

          btn.innerHTML = `
            <div style="font-weight: bold; font-size: 34px;">
              ${cat.nameCat || cat.nombre || `Categoría ${i+1}`}
            </div>
            <div style="font-weight: bold; font-size: 34px; color: red;">
              ${cat.codCat ? cat.codCat : 'Sin Código'}
            </div>
          `;

          btn.style.cssText = `
            width: 150px;
            height: 100px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #0074D9;
            background: #f0f8ff;
            cursor: pointer;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
          `;

          btn.onclick = () =>
            abrirCarrusel(cat.nameCat || cat.nombre || `Categoría ${i+1}`);

          contenedorBody.appendChild(btn);
        });
      }

      contenedorBody.style.display = 'flex';
    }
  }

  /* ============================================================
     PROCEDURE DIVISION – AUTOMÁTICO PRENDER/APAGAR
     ============================================================ */

  let autoActivo = true;      // ← El automático inicia PRENDIDO
  let autoTimer = null;

  function iniciarAutomatico(){
    if(autoTimer) return;     // Ya está corriendo
    autoTimer = setInterval(() => {
      toggleDuplicarCategorias();
    }, 3000);
  }

  function detenerAutomatico(){
    clearInterval(autoTimer);
    autoTimer = null;
  }

  // Arranque automático al cargar
  iniciarAutomatico();

  /* ============================================================
     PROCEDURE DIVISION – BOTÓN PRODUCTOS (SOLO PRENDE/APAGA AUTO)
     ============================================================ */
  const btnDuplicar = document.getElementById("duplicarCatsBtn");
  btnDuplicar.addEventListener("click", () => {

    if(autoActivo){
      detenerAutomatico();    // APAGA
      autoActivo = false;
    } else {
      iniciarAutomatico();    // PRENDE
      autoActivo = true;
    }

  });

});
</script>

<input

  type="text"

  style="

    bottom: 200px;

<script>
// Recuperar el valor guardado en localStorage al cargar la página
window.addEventListener("load", () => {
  const textoGuardado = localStorage.getItem("textoGuardado");
  const inputTexto = document.getElementById("inputTexto");
  
  if (textoGuardado) {
    inputTexto.value = textoGuardado;  // Cargar el texto guardado al campo
  }
});

// Guardar el valor mientras el usuario escribe
document.getElementById("inputTexto").addEventListener("input", (event) => {
  localStorage.setItem("textoGuardado", event.target.value);  // Guardar el texto en localStorage
});
</script>
