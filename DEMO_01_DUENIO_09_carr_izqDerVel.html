<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMO_01_DUENIO_09_carr_izqDerVel</title>


<style>
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background-color: #f0f2f5; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: 20px; 
        overflow-x: hidden; 
        margin: 0;
        min-height: 100vh;
    }

    #contenedor-formulario {
        width: 100%;
        max-width: 450px;
        z-index: 100;
        margin-top: 50px;
    }

    .card { 
        background: yellow; 
        padding: 30px; 
        border-radius: 20px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        text-align: center; 
        color: blue;
    }

    /* Estilo para el control de velocidad */
    .control-velocidad {
        margin: 20px 0;
        text-align: left;
        font-weight: bold;
    }

    input[type="range"] {
        width: 100%;
        cursor: pointer;
    }

    #btn-regresar {
        display: none; 
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 10px 25px;
        background: yellow;
        color: blue;
        border: 2px solid blue; 
        border-radius: 30px;
        font-weight: bold;
        cursor: pointer;
        z-index: 1000;
    }

    input[type="text"] { 
        padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; width: 90%; font-size: 16px;
    }

    button.principal { 
        padding: 15px 30px; background-color: blue; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px;
    }

    .escena-3d {
        width: 100%; height: 500px; perspective: 1200px; display: flex; justify-content: center; align-items: center; margin-top: 20px;
    }

    .carrusel-track-3d {
        width: 200px; height: 200px; position: relative; transform-style: preserve-3d;
        animation: rotarVaiven 20s ease-in-out infinite; /* 20s por defecto */
        will-change: transform;
    }

    .foto-item {
        position: absolute; width: 180px; height: 180px; left: 10px; top: 10px; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.4); border: 4px solid white; backface-visibility: hidden;
    }

    .foto-item img { width: 100%; height: 100%; object-fit: cover; }

    @keyframes rotarVaiven {
        0% { transform: rotateY(0deg); }
        50% { transform: rotateY(360deg); }
        100% { transform: rotateY(0deg); }
    }
</style>
</head>
<body>

<button id="btn-regresar" onclick="alternarVista(true)">⚙️ Configurar Vitrina</button>

<div id="contenedor-formulario">
    <div class="card">
        <h1 style="margin-top:0">VitrinasOnline.com</h1>
        <p>Carga las fotos de tu negocio</p>
        
        <input type="text" id="nombreEmpresa" placeholder="Nombre de tu Empresa">
        <br>
        <input type="file" id="fotosPC" multiple accept="image/*">
        
        <div class="control-velocidad">
            <label>Velocidad del Vaivén: <span id="valorVelocidad">20</span>s</label>
            <input type="range" id="sliderVelocidad" min="5" max="60" value="20" oninput="actualizarVelocidad(this.value)">
            <small>(Menos segundos = Más rápido)</small>
        </div>

        <button class="principal" onClick="cargarImagenesLocales()">GENERAR VITRINA</button>
    </div>
</div>

<h2 id="resultado-titulo" style="color: blue; margin-top: 20px; font-size: 28px;"></h2>

<div class="escena-3d">
    <div class="carrusel-track-3d" id="trackFotos3D"></div>
</div>

<script>
let velocidadActual = 20;

function actualizarVelocidad(valor) {
    velocidadActual = valor;
    document.getElementById('valorVelocidad').innerText = valor;
    
    // Si el carrusel ya está visible, actualizamos la animación en tiempo real
    const track = document.getElementById('trackFotos3D');
    track.style.animationDuration = valor + "s";
}

function alternarVista(mostrarFormulario) {
    const formulario = document.getElementById('contenedor-formulario');
    const btnRegresar = document.getElementById('btn-regresar');
    const track = document.getElementById('trackFotos3D');
    
    if (mostrarFormulario) {
        formulario.style.display = "block";
        btnRegresar.style.display = "none";
        track.innerHTML = ""; 
    } else {
        formulario.style.display = "none";
        btnRegresar.style.display = "block";
    }
}

function cargarImagenesLocales() {
    const empresa = document.getElementById('nombreEmpresa').value;
    const inputFiles = document.getElementById('fotosPC');
    
    if (!empresa || inputFiles.files.length === 0) {
        return alert("Por favor, ingresa el nombre de la empresa y selecciona fotos.");
    }

    document.getElementById('resultado-titulo').innerText = empresa;
    const urlsLocales = Array.from(inputFiles.files).map(f => URL.createObjectURL(f));
    
    llenarCarrusel3D(urlsLocales);
    alternarVista(false);
}

function llenarCarrusel3D(imagenes) {
    const track = document.getElementById('trackFotos3D');
    track.innerHTML = "";
    
    // Aplicamos la velocidad seleccionada antes de mostrar
    track.style.animationDuration = velocidadActual + "s";
    
    const total = imagenes.length;
    const angulo = 360 / total;
    const radio = Math.max(300, total * 45);

    imagenes.forEach((src, i) => {
        const div = document.createElement('div');
        div.className = 'foto-item';
        div.style.transform = `rotateY(${angulo * i}deg) translateZ(${radio}px)`;
        div.innerHTML = `<img src="${src}">`;
        track.appendChild(div);
    });
}
</script>
</body>
</html>
