<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMO_01_DUENIO_04_carrusel</title>


<style>
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background-color: #f0f2f5; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: 20px; 
        overflow-x: hidden; /* Evita scroll horizontal por el 3D */
    }

    .card { 
        background: yellow; 
        padding: 10px; 
        border-radius: 15px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        width: 100%; 
        max-width: 400px; 
        text-align: center; 
        z-index: 10; /* Asegura que el formulario est� al frente */
		font-size:20px;
		color:blue;
    }

    /* Contenedor principal del carrusel */
    .escena-3d {
        width: 100%;
        height: 400px;
        perspective: 1000px; /* Profundidad de campo */
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 50px;
    }

    .carrusel-track-3d {
        width: 200px;
        height: 200px;
        position: relative;
        transform-style: preserve-3d;
        animation: rotar 20s linear infinite;
    }

    .foto-item {
        position: absolute;
        width: 150px;
        height: 150px;
        left: 25px;
        top: 25px;
        border-radius: 15px; /* Cambiado a cuadrado redondeado para mejor visibilidad */
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        border: 3px solid white;
        backface-visibility: visible; /* Importante para verlas al girar */
    }

    .foto-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    @keyframes rotar {
        from { transform: rotateY(0deg); }
        to { transform: rotateY(360deg); }
    }

    /* Pausar al pasar el mouse */
    .carrusel-track-3d:hover {
        animation-play-state: paused;
    }
</style>
</head>
<body>

<div class="card">
    <h1>VitrinasOnline.com</h1>
    <!--<h2>Configura tu catalogo visual</h2>  -->
    <input type="text" id="nombreEmpresa" placeholder="Name Empresa">
	<br>
    <input type="text" id="especialidad" placeholder="Que vende? (ej. Relojes)">
	<br>
    <button onClick="buscarImagenes()">Generar Catalogo</button>
</div>

<h2 id="resultado-titulo"></h2>

<div class="escena-3d">
    <div class="carrusel-track-3d" id="trackFotos3D"></div>
</div>



<script>
// Tu API Key es v�lida, la usaremos directamente
const MI_API_KEY = "oOudy2bdKxfLaNaQTINinjniBOg3WwfKBziq8R3qpQX7Dd3zOLFP023r"; 

async function buscarImagenes() {
    const empresa = document.getElementById('nombreEmpresa').value;
    const especialidad = document.getElementById('especialidad').value;
    const track = document.getElementById('trackFotos3D');
    const titulo = document.getElementById('resultado-titulo');

    if (!especialidad || !empresa) {
        alert("Por favor, llena ambos campos");
        return;
    }

    titulo.innerText = `Catalogo para: ${empresa}`;
    track.innerHTML = ""; // Limpiar

    try {
        const numPagina = Math.floor(Math.random() * 10) + 1;
        const response = await fetch(`https://api.pexels.com/v1/search?query=${especialidad}&per_page=8&page=${numPagina}`, {
            headers: { Authorization: MI_API_KEY }
        });
        
        const data = await response.json();

        if (!data.photos || data.photos.length === 0) {
            track.innerHTML = "<p>No se hallaron im�genes.</p>";
            return;
        }

        const imagenesAPI = data.photos.map(foto => foto.src.medium);
        llenarCarrusel3D(imagenesAPI);

    } catch (error) {
        console.error("Error:", error);
        track.innerHTML = "<p>Error de conexi�n.</p>";
    }
}

function llenarCarrusel3D(imagenes) {
    const track = document.getElementById('trackFotos3D');
    track.innerHTML = "";
    
    const total = imagenes.length;
    const angulo = 360 / total;
    const radio = 250; // Radio del c�rculo (ajustado para que no se encimen)

    imagenes.forEach((src, i) => {
        const div = document.createElement('div');
        div.className = 'foto-item';
        // Aplicamos la rotaci�n individual y el desplazamiento hacia afuera (Z)
        div.style.transform = `rotateY(${i * angulo}deg) translateZ(${radio}px)`;
        div.innerHTML = `<img src="${src}" alt="img">`;
        track.appendChild(div);
    });
}
</script>
</body>
</html>
