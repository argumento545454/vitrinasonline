<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEMO_01_RAIZ_05</title>  <!-- index.html -->



<style>
  body { margin:0; font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; }
  h1 { font-size:2.2rem; margin-bottom:40px; text-align:center; }
  button { padding:18px 40px; font-size:1.2rem; cursor:pointer; border:none; border-radius:10px; background:#0066ff; color:#fff; box-shadow:0 4px 14px rgba(0,0,0,0.2); transition:0.2s; }
  button:hover { background:#004ecc; }
  #appContainer { width:100%; height:100%; }
</style>
</head>
<body>
<h1>Vitrinas Online controladas por VOZ</h1>
<button id="btnStart">EJECUTAR PROGRAMA</button>

<!-- Contenedor donde se cargará el segmento en memoria -->
<div id="appContainer"></div>

<script>
document.getElementById("btnStart").addEventListener("click", () => {
    // Evitar duplicar el script si se hace clic varias veces
    if(document.getElementById('segmentScript')) return;

    // Crear el script dinámicamente
    const script = document.createElement('script');
    //script.src = 'ropa_61.js';
    script.src = 'DEMO_RAIZ_carr_1en1_05_4.js';
    script.id = 'segmentScript';
    script.type = 'text/javascript';

    // Insertarlo en el contenedor appContainer
    document.getElementById('appContainer').appendChild(script);
});
</script>
</body>

</html>
