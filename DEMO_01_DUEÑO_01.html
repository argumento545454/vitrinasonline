<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMO_01_DUEŃO_01</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #1a73e8; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #1a73e8; outline: none; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #1557b0; }
        
        /* Contenedor del Carrusel */
        #resultado-titulo { margin-top: 40px; color: #333; }
        .carrusel { display: flex; overflow-x: auto; gap: 20px; width: 100%; max-width: 900px; padding: 20px 0; scroll-behavior: smooth; }
        .carrusel::-webkit-scrollbar { height: 8px; }
        .carrusel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        .foto-item { flex: 0 0 auto; width: 280px; height: 350px; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .foto-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Ropa3</h1>
        <p>Configura tu catálogo visual</p>
        <input type="text" id="nombreEmpresa" placeholder="Nombre de tu empresa">
        <input type="text" id="especialidad" placeholder="żQué vendes? (ej. Relojes)">
        <button onclick="buscarImagenes()">Generar Catálogo</button>
    </div>

    <h2 id="resultado-titulo"></h2>
    <div class="carrusel" id="contenedorFotos">
        </div>

    <script>
        // AQUÍ IRÁ TU LLAVE CUANDO LA TENGAS
        //const MI_API_KEY = "TU_LLAVE_AQUI"; 
        const MI_API_KEY = "TU_LLAVE_AQUI"; 

        async function buscarImagenes() {
            const empresa = document.getElementById('nombreEmpresa').value;
            const especialidad = document.getElementById('especialidad').value;
            const contenedor = document.getElementById('contenedorFotos');
            const titulo = document.getElementById('resultado-titulo');

            if (!especialidad || !empresa) {
                alert("Por favor, llena ambos campos");
                return;
            }

            // Validar si ya pusiste la llave
            if (MI_API_KEY === "TU_LLAVE_AQUI") {
                alert("ˇCasi listo! Primero debes pegar tu API Key de Pexels en el código.");
                return;
            }

            titulo.innerText = `Catálogo para: ${empresa}`;
            contenedor.innerHTML = "<p>Buscando las mejores imágenes...</p>";

            try {
                const response = await fetch(`https://api.pexels.com/v1/search?query=${especialidad}&per_page=6`, {
                    headers: { Authorization: MI_API_KEY }
                });
                
                const data = await response.json();
                contenedor.innerHTML = ""; // Limpiar mensaje de carga

                if (data.photos.length === 0) {
                    contenedor.innerHTML = "<p>No encontramos fotos. Intenta con otra palabra.</p>";
                    return;
                }

                // Dibujar las fotos en el carrusel
                data.photos.forEach(foto => {
                    const div = document.createElement('div');
                    div.className = 'foto-item';
                    div.innerHTML = `<img src="${foto.src.large}" alt="${especialidad}">`;
                    contenedor.appendChild(div);
                });

            } catch (error) {
                console.error("Error:", error);
                contenedor.innerHTML = "<p>Hubo un error al conectar con el servidor de imágenes.</p>";
            }
        }
    </script>
</body>
</html>
